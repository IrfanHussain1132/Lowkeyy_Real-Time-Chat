<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lowkeyy Chat</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app">

        <!-- HEADER -->
        <div class="header">
            <div class="header-icon">🔥</div>
            <div class="header-title">Lowkeyy</div>

            <div class="toggle" onclick="toggleTheme(this)">
                <div class="knob">🌙</div>
            </div>
        </div>

        <!-- USER + ROOM -->
        <div class="top-controls">
            <input id="username" placeholder="Enter your name" />
            <input id="room" placeholder="Room ID (e.g. abc123)" />
            <button onclick="joinRoom()">Join</button>
        </div>

        <!-- CHAT -->
        <ul id="chat"></ul>

        <!-- INPUT -->
        <div class="input-bar">
            <input id="message" placeholder="Type message..." />
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
